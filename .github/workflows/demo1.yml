name: Events Demo 1
on:
  pull_request:
    types:
      - opened 
    branches:
      - main # main branch only
      - 'dev-*' # dev-new
      - 'feat/**' # 'feat/new_feat/new/button'
  workflow_dispatch:
  push:
    branches:
      - main # main
      - 'dev-*'  # dev-new
      - 'feat/**' # 'feat/new_feat/new/button'
    paths-ignore:
      - '/.github/workflows/*'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Deploy project
        run: echo "Deploying..."
